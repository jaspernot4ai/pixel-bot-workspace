<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art UI - Animated Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #fff;
      padding: 20px;
      overflow-x: hidden;
    }
    
    h1 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 15px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow {
      from { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; color: #ff00ff; }
      to { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; color: #00ffff; }
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    /* Animated Bot Grid */
    .bot-grid {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .bot-card {
      width: 100px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid #333;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      animation: borderPulse 3s ease-in-out infinite;
    }
    
    .bot-card:nth-child(1) { animation-delay: 0s; }
    .bot-card:nth-child(2) { animation-delay: 0.5s; }
    .bot-card:nth-child(3) { animation-delay: 1s; }
    .bot-card:nth-child(4) { animation-delay: 1.5s; }
    
    @keyframes borderPulse {
      0%, 100% { border-color: #333; box-shadow: none; }
      50% { border-color: #00ffff; box-shadow: 0 0 15px #00ffff55; }
    }
    
    .bot-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      animation: iconPulse 2s ease-in-out infinite;
    }
    
    .bot-icon.idle { background: #22c55e55; border: 2px solid #22c55e; }
    .bot-icon.working { background: #3b82f655; border: 2px solid #3b82f6; }
    .bot-icon.broadcasting { background: #ef444455; border: 2px solid #ef4444; }
    
    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .bot-name {
      font-size: 10px;
      color: #888;
      margin-bottom: 5px;
    }
    
    .bot-status {
      font-size: 8px;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
    }
    
    .bot-status.idle { background: #22c55e33; color: #22c55e; }
    .bot-status.working { background: #3b82f633; color: #3b82f6; }
    .bot-status.broadcasting { background: #ef444433; color: #ef4444; }
    
    /* Animated Map */
    .map-container {
      background: #111;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .map-title {
      font-size: 10px;
      color: #666;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .pixel-map {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 1px;
      background: #222;
      padding: 2px;
      border-radius: 4px;
    }
    
    .pixel-cell {
      aspect-ratio: 1;
      background: #1a1a2e;
      position: relative;
    }
    
    .pixel-cell.bot {
      background: #22c55e44;
      animation: cellBlink 2s ease-in-out infinite;
    }
    
    .pixel-cell.working { background: #3b82f644; animation: cellBlink 1s ease-in-out infinite; }
    
    @keyframes cellBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Animated Chat Bubbles */
    .chat-section {
      background: #111;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 15px;
      min-height: 120px;
      position: relative;
      overflow: hidden;
    }
    
    .chat-bubble {
      background: linear-gradient(135deg, #2a2a4a 0%, #1a1a3a 100%);
      border: 2px solid #4a4a8a;
      padding: 8px 12px;
      border-radius: 12px;
      display: inline-block;
      font-size: 11px;
      animation: bubbleSlide 3s ease-out forwards;
      position: relative;
    }
    
    .chat-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 20px;
      border: 6px solid transparent;
      border-top-color: #4a4a8a;
    }
    
    @keyframes bubbleSlide {
      0% { transform: translateY(20px); opacity: 0; }
      20% { transform: translateY(0); opacity: 1; }
      80% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-10px); opacity: 0; }
    }
    
    .chat-bubble:nth-child(1) { animation-delay: 0s; }
    .chat-bubble:nth-child(2) { animation-delay: 1.5s; margin-left: 30px; }
    .chat-bubble:nth-child(3) { animation-delay: 3s; margin-left: 60px; }
    
    /* Neon Glow Effects */
    .glow-text {
      font-size: 12px;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      animation: textGlow 2s ease-in-out infinite alternate;
    }
    
    @keyframes textGlow {
      from { text-shadow: 0 0 10px #00ffff; }
      to { text-shadow: 0 0 20px #00ffff, 0 0 30px #00ffff; }
    }
    
    .neon-border {
      height: 3px;
      background: linear-gradient(90deg, transparent, #ff00ff, #00ffff, #ff00ff, transparent);
      background-size: 200% 100%;
      animation: neonFlow 3s linear infinite;
      margin: 15px 0;
      border-radius: 2px;
    }
    
    @keyframes neonFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    
    /* Floating Elements */
    .floating-element {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #00ffff;
      border-radius: 50%;
      animation: float 4s ease-in-out infinite;
      opacity: 0.6;
    }
    
    .floating-element:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
    .floating-element:nth-child(2) { top: 60%; left: 85%; animation-delay: 1s; }
    .floating-element:nth-child(3) { top: 80%; left: 50%; animation-delay: 2s; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-20px) scale(1.5); opacity: 0.3; }
    }
    
    .description {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>◈ NEON PIXEL DASHBOARD ◈</h1>
    
    <div class="neon-border"></div>
    
    <div class="bot-grid">
      <div class="bot-card">
        <div class="bot-icon idle">●</div>
        <div class="bot-name">FRONTEND</div>
        <div class="bot-status idle">IDLE</div>
      </div>
      <div class="bot-card">
        <div class="bot-icon working">●</div>
        <div class="bot-name">BACKEND</div>
        <div class="bot-status working">WORKING</div>
      </div>
      <div class="bot-card">
        <div class="bot-icon broadcasting">●</div>
        <div class="bot-name">DATA</div>
        <div class="bot-status broadcasting">BROADCAST</div>
      </div>
      <div class="bot-card">
        <div class="bot-icon idle">●</div>
        <div class="bot-name">DEVOPS</div>
        <div class="bot-status idle">IDLE</div>
      </div>
    </div>
    
    <div class="map-container">
      <div class="map-title">◢ LIVE MAP (16x16) ◣</div>
      <div class="pixel-map">
        <script>
          for(let i = 0; i < 256; i++) {
            const isBot = [0, 1, 2, 17, 18, 33, 34].includes(i);
            const isWorking = i === 18;
            const classes = isBot ? (isWorking ? 'pixel-cell bot working' : 'pixel-cell bot') : 'pixel-cell';
            document.write('<div class="' + classes + '"></div>');
          }
        </script>
      </div>
      <div class="description">Green = Bot Station | Blue = Working | Dark = Empty</div>
    </div>
    
    <div class="chat-section">
      <div class="floating-element"></div>
      <div class="floating-element"></div>
      <div class="floating-element"></div>
      <div class="glow-text" style="margin-bottom: 15px; display: block; text-align: center;">
        ◈ LIVE MESSAGE STREAM ◈
      </div>
      <div class="chat-bubble">收到 ✅</div>
      <div class="chat-bubble">API 連接成功</div>
      <div class="chat-bubble">任務完成！</div>
    </div>
    
    <div class="description" style="margin-top: 20px;">
      Animation Preview | Neon Pixel Style | All elements animated
    </div>
  </div>
</body>
</html>
